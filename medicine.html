<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisitCare Medicine Store</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Segoe UI,sans-serif;
    background:#f4f7fb;
}
header{
    background:#0a66c2;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{font-size:22px;font-weight:bold}
.cart-btn{
    background:white;
    color:#0a66c2;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}
.hero{
    background:linear-gradient(120deg,#0a66c2,#00c6ff);
    color:white;
    text-align:center;
    padding:45px 15px;
}
.search-box{
    width:90%;
    max-width:450px;
    padding:13px;
    border:none;
    border-radius:10px;
    margin-top:15px;
}
.products{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}
.card{
    background:white;
    border-radius:14px;
    padding:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
    text-align:center;
}
.card img{
    width:90px;
    height:90px;
    object-fit:contain;
}
.card button,.popup-box button{
    background:#0a66c2;
    color:white;
    border:none;
    padding:10px 12px;
    border-radius:8px;
    margin-top:8px;
}
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
    padding:15px;
}
.popup-box{
    background:white;
    width:100%;
    max-width:420px;
    max-height:90vh;
    overflow:auto;
    border-radius:15px;
    padding:20px;
}
.popup-box input,textarea{
    width:100%;
    padding:10px;
    margin:7px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
.cart-item{
    background:#f1f6ff;
    padding:10px;
    border-radius:8px;
    margin:8px 0;
}
.cart-item button{
    padding:6px 9px;
    margin-right:4px;
}
</style>
</head>

<body>

<header>
    <div class="logo">💊 VisitCare</div>
    <button class="cart-btn" onclick="openCart()">Cart 🛒 <span id="cartCount">0</span></button>
</header>

<section class="hero">
    <h1>Medicine Store</h1>
    <p>Fast medicine delivery at your doorstep</p>
    <input class="search-box" id="searchInput" onkeyup="searchMedicine()" placeholder="Search medicine...">
</section>

<section class="products" id="productList">

    <div class="card" data-name="Paracetamol">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png">
        <h3>Paracetamol</h3>
        <p>₹25</p>
        <button onclick="addToCart('Paracetamol',25)">Add to Cart</button>
    </div>

    <div class="card" data-name="Cough Syrup">
        <img src="https://cdn-icons-png.flaticon.com/512/822/822143.png">
        <h3>Cough Syrup</h3>
        <p>₹85</p>
        <button onclick="addToCart('Cough Syrup',85)">Add to Cart</button>
    </div>

    <div class="card" data-name="Vitamin C">
        <img src="https://cdn-icons-png.flaticon.com/512/4320/4320337.png">
        <h3>Vitamin C</h3>
        <p>₹120</p>
        <button onclick="addToCart('Vitamin C',120)">Add to Cart</button>
    </div>

    <div class="card" data-name="Pain Relief Gel">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966486.png">
        <h3>Pain Relief Gel</h3>
        <p>₹95</p>
        <button onclick="addToCart('Pain Relief Gel',95)">Add to Cart</button>
    </div>

</section>

<div class="popup" id="popup">
    <div class="popup-box">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>

        <h3>Total: ₹<span id="totalAmount">0</span></h3>

        <input id="custName" placeholder="Your Name">
        <input id="custPhone" placeholder="Phone Number">
        <input id="custEmail" placeholder="Email Optional">
        <textarea id="address" placeholder="Full Address"></textarea>

        <button onclick="getLocation()">📍 Use My Location</button>
        <button onclick="payNow()">💳 Pay UPI</button>
        <button onclick="submitOrder()">✅ Place Order</button>
        <button onclick="closePopup()" style="background:red">Close</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("visitcare_cart")) || [];

function saveCart(){
    localStorage.setItem("visitcare_cart", JSON.stringify(cart));
    updateCartCount();
}

function updateCartCount(){
    let count = cart.reduce((sum,item)=>sum + item.qty,0);
    document.getElementById("cartCount").innerText = count;
}

function addToCart(name, price){
    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.qty++;
    }else{
        cart.push({name, price, qty:1});
    }

    saveCart();
    alert("✅ Added to cart");
}

function openCart(){
    if(cart.length === 0){
        alert("Cart empty hai");
        return;
    }

    document.getElementById("custName").value = localStorage.getItem("visitcare_name") || "";
    document.getElementById("custPhone").value = localStorage.getItem("visitcare_phone") || "";
    document.getElementById("custEmail").value = localStorage.getItem("visitcare_email") || "";

    renderCart();
    document.getElementById("popup").style.display = "flex";
}

function renderCart(){
    let cartBox = document.getElementById("cartItems");
    cartBox.innerHTML = "";
    let total = 0;

    cart.forEach((item,index)=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        cartBox.innerHTML += `
        <div class="cart-item">
            <b>${item.name}</b><br>
            ₹${item.price} × ${item.qty} = ₹${itemTotal}<br>
            <button onclick="increaseQty(${index})">+</button>
            <button onclick="decreaseQty(${index})">-</button>
            <button onclick="removeItem(${index})">Remove</button>
        </div>`;
    });

    document.getElementById("totalAmount").innerText = total;
    localStorage.setItem("cartTotal", total);
}

function increaseQty(i){
    cart[i].qty++;
    saveCart();
    renderCart();
}

function decreaseQty(i){
    if(cart[i].qty > 1){
        cart[i].qty--;
    }else{
        cart.splice(i,1);
    }
    saveCart();
    cart.length === 0 ? closePopup() : renderCart();
}

function removeItem(i){
    cart.splice(i,1);
    saveCart();
    cart.length === 0 ? closePopup() : renderCart();
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function getLocation(){
    if(!navigator.geolocation){
        alert("Location supported nahi hai");
        return;
    }

    navigator.geolocation.getCurrentPosition(async function(pos){
        let lat = pos.coords.latitude;
        let lon = pos.coords.longitude;

        try{
            let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            let data = await res.json();
            document.getElementById("address").value = data.display_name;
        }catch{
            document.getElementById("address").value = lat + "," + lon;
        }
    }, function(){
        alert("Location permission allow karo");
    });
}

function payNow(){
    let total = localStorage.getItem("cartTotal") || "0";
    let upiId = "YOUR_UPI_ID@upi";
    let link = `upi://pay?pa=${upiId}&pn=VisitCare&am=${total}&cu=INR&tn=Medicine Order`;
    window.location.href = link;
}

function getCartText(){
    return cart.map(i => `${i.name} x ${i.qty}`).join(", ");
}

function getTotalQty(){
    return cart.reduce((s,i)=>s+i.qty,0);
}

function submitOrder(){
    if(cart.length === 0){
        alert("Cart empty hai");
        return;
    }

    let name = document.getElementById("custName").value.trim();
    let phone = document.getElementById("custPhone").value.trim();
    let email = document.getElementById("custEmail").value.trim();
    let address = document.getElementById("address").value.trim();

    if(!name || !phone || !address){
        alert("Name, phone aur address fill karo");
        return;
    }

    localStorage.setItem("visitcare_name", name);
    localStorage.setItem("visitcare_phone", phone);
    localStorage.setItem("visitcare_email", email);

    let medicine = getCartText();
    let quantity = getTotalQty();
    let price = localStorage.getItem("cartTotal") || "0";
    let payment = confirm("UPI se pay kiya? OK = Yes / Cancel = Pay at Home");
    let paymentMode = payment ? "UPI" : "COD";

    fetch("https://script.google.com/macros/s/AKfycbyJEbNW1FIY6oV8l97Lv1QCCQHXmE4KiEuNCfETDqZQ95jL2sj7Z-5D5TJmVMdDh0T2Bw/exec" +
    `?type=medicine_order&medicine=${encodeURIComponent(medicine)}&quantity=${quantity}&price=${price}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&email=${encodeURIComponent(email)}&address=${encodeURIComponent(address)}&payment=${paymentMode}`)
    .then(res => res.text())
    .then(() => {
        document.querySelector(".popup-box").innerHTML = `
            <h2 style="color:green;">✅ Order Confirmed</h2>
            <p>${name}, your medicine order is placed!</p>
            <p><b>Items:</b> ${medicine}</p>
            <p><b>Total:</b> ₹${price}</p>
            <p><b>Payment:</b> ${paymentMode}</p>
            <button onclick="location.reload()">OK</button>
        `;

        let orders = JSON.parse(localStorage.getItem("visitcare_orders")) || [];
        orders.push({
            type:"Medicine",
            details:medicine,
            price:price,
            payment:paymentMode,
            status:"Processing"
        });
        localStorage.setItem("visitcare_orders", JSON.stringify(orders));

        cart = [];
        saveCart();
    })
    .catch(()=>{
        alert("Order failed. Apps Script URL check karo.");
    });
}

function searchMedicine(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{
        let name = card.dataset.name.toLowerCase();
        card.style.display = name.includes(input) ? "block" : "none";
    });
}

updateCartCount();
</script>

</body>
</html>
