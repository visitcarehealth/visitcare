<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - VisitCare</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
}

header {
    background: #0a66c2;
    color: white;
    padding: 15px 20px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

.profile-container {
    max-width: 450px;
    margin: 25px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
    text-align: center;
}

.profile-pic {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid #0a66c2;
    object-fit: cover;
    margin-bottom: 15px;
}

.upload-btn {
    background: #0a66c2;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    margin-bottom: 15px;
}

.details {
    text-align: left;
    font-size: 15px;
}

.details p {
    background: #f4f7fb;
    padding: 12px;
    border-radius: 10px;
    margin: 10px 0;
}

.btn {
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
}

.orders-btn {
    background: #0a66c2;
    color: white;
}

.back-btn {
    background: gray;
    color: white;
}

.logout-btn {
    background: red;
    color: white;
}
</style>
</head>

<body>

<header>My Profile</header>

<div class="profile-container">

    <img id="profilePic" class="profile-pic" src="" alt="Profile Picture">

    <input type="file" id="uploadPhoto" accept="image/*" style="display:none;" onchange="uploadProfilePic(event)">
    <button class="upload-btn" onclick="document.getElementById('uploadPhoto').click()">📷 Upload Profile Photo</button>

    <div class="details">
        <p id="pName"></p>
        <p id="pPhone"></p>
        <p id="pEmail"></p>
        <p id="pGender"></p>
    </div>

    <button class="btn orders-btn" onclick="openOrders()">📦 My Orders</button>
    <button class="btn logout-btn" onclick="logoutUser()">🚪 Logout</button>
    <button class="btn back-btn" onclick="goBack()">⬅ Back to Home</button>

</div>

<script>
window.onload = function() {
    let loggedIn = localStorage.getItem("visitcare_loggedin");
    if (!loggedIn) {
        window.location.href = "index.html";
        return;
    }
    loadProfile();
};

function loadProfile() {
    let name = localStorage.getItem("visitcare_name") || "";
    let phone = localStorage.getItem("visitcare_phone") || "";
    let email = localStorage.getItem("visitcare_email") || "";
    let gender = localStorage.getItem("visitcare_gender") || "";

    let genderEmoji = "👤";
    if (gender === "Male") genderEmoji = "👨";
    if (gender === "Female") genderEmoji = "👩";

    document.getElementById("pName").innerHTML = "👤 <b>Name:</b> " + name;
    document.getElementById("pPhone").innerHTML = "📞 <b>Phone:</b> " + phone;
    document.getElementById("pEmail").innerHTML = "📧 <b>Email:</b> " + email;
    document.getElementById("pGender").innerHTML = genderEmoji + " <b>Gender:</b> " + gender;

    updateProfilePic();
}

function updateProfilePic() {
    let savedPic = localStorage.getItem("visitcare_profilepic");
    let gender = localStorage.getItem("visitcare_gender");

    let defaultEmoji = "👤";
    if (gender === "Male") defaultEmoji = "👨";
    if (gender === "Female") defaultEmoji = "👩";

    if (savedPic) {
        document.getElementById("profilePic").src = savedPic;
    } else {
        let emojiSVG = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><text x='50%25' y='60%25' font-size='90' text-anchor='middle'>${defaultEmoji}</text></svg>`;
        document.getElementById("profilePic").src = emojiSVG;
    }
}

function uploadProfilePic(event) {
    let file = event.target.files[0];

    if (file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            localStorage.setItem("visitcare_profilepic", e.target.result);
            updateProfilePic();
        };
        reader.readAsDataURL(file);
    }
}

function openOrders() {
    window.location.href = "orders.html";
}

function logoutUser() {
    localStorage.removeItem("visitcare_loggedin");
    localStorage.removeItem("visitcare_name");
    localStorage.removeItem("visitcare_phone");
    localStorage.removeItem("visitcare_email");
    localStorage.removeItem("visitcare_gender");
    localStorage.removeItem("visitcare_profilepic");

    window.location.href = "index.html";
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
