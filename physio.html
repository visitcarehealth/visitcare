<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiotherapy - VisitCare</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
    margin: 0;
    text-align: center;
}

header {
    background: #0a66c2;
    color: white;
    padding: 15px;
}

.form-box {
    background: white;
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    background: #0a66c2;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

.pay {
    background: #25D366;
}
</style>
</head>

<body>

<header>
    <h2>Physiotherapy Service</h2>
</header>

<div class="form-box">

<h3>Book Physiotherapist</h3>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Address">

<input type="date" id="date">
<input type="time" id="time">

<textarea id="problem" placeholder="Describe problem"></textarea>

<label><input type="radio" name="payment" value="upi" checked> UPI</label>
<label><input type="radio" name="payment" value="cod"> Pay at Home</label>

<button class="pay" onclick="payNow()">💳 Pay with UPI</button>
<button onclick="submitBooking()">Confirm Booking</button>

</div>

<script>
window.onload = function(){
    document.getElementById("name").value = localStorage.getItem("visitcare_name") || "";
    document.getElementById("phone").value = localStorage.getItem("visitcare_phone") || "";
};

function payNow(){
    let amount = 300;
    let upi = "YOUR_UPI_ID@upi";

    let link = `upi://pay?pa=${upi}&pn=VisitCare&am=${amount}&cu=INR&tn=Physio Booking`;
    window.location.href = link;
}

function submitBooking(){
    let nameValue = document.getElementById("name").value;
    let phoneValue = document.getElementById("phone").value;
    let addressValue = document.getElementById("address").value;
    let dateValue = document.getElementById("date").value;
    let timeValue = document.getElementById("time").value;
    let problemValue = document.getElementById("problem").value;

    let payment = document.querySelector('input[name="payment"]:checked').value;

    if(!nameValue || !phoneValue || !addressValue || !dateValue || !timeValue){
        alert("Fill all details");
        return;
    }

    let url = "https://script.google.com/macros/s/AKfycbyJEbNW1FIY6oV8l97Lv1QCCQHXmE4KiEuNCfETDqZQ95jL2sj7Z-5D5TJmVMdDh0T2Bw/exec";

    fetch(url + `?type=physio_booking&name=${encodeURIComponent(nameValue)}&phone=${encodeURIComponent(phoneValue)}&address=${encodeURIComponent(addressValue)}&date=${encodeURIComponent(dateValue)}&time=${encodeURIComponent(timeValue)}&problem=${encodeURIComponent(problemValue)}&payment=${encodeURIComponent(payment)}&price=300`)
    .then(res=>res.text())
    .then(()=>{
        document.body.innerHTML = `
        <div style="font-family:sans-serif; text-align:center; padding:40px;">
            <h2 style="color:green;">✅ Booking Confirmed</h2>
            <p>${nameValue}, physiotherapist will visit you.</p>
            <p>Date: ${dateValue}</p>
            <p>Time: ${timeValue}</p>
            <p>Payment: ${payment === "upi" ? "UPI" : "Pay at Home"}</p>
            <p>Total: ₹300</p>
        </div>
        `;

        let orders = JSON.parse(localStorage.getItem("visitcare_orders")) || [];

        orders.push({
            type: "Physiotherapy",
            details: "Physiotherapy Service",
            price: "300",
            date: dateValue,
            time: timeValue,
            payment: payment === "upi" ? "UPI" : "Pay at Home"
        });

        localStorage.setItem("visitcare_orders", JSON.stringify(orders));
    })
    .catch(()=>alert("Booking failed"));
}
</script>

</body>
</html>
